<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Feedback</title>
  <link rel="stylesheet" href="./assets/nav.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .navbar {
      background: #2a2a2a;
      padding: 12px 20px;
      border-bottom: 1px solid #444;
    }

    .nav-container {
      max-width: 1200px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      color: #64b5f6;
      font-weight: bold;
      text-decoration: none;
      font-size: 20px;
    }

    .nav-links a {
      color: #e0e0e0;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #64b5f6;
    }
    body{margin:0;background:#393636;color:#e0e0e0;font-family:system-ui,Segoe UI,Arial}
    .wrap{max-width:1200px;margin:16px auto;padding:0 16px}
    .card{background:#2a2a2a;border:1px solid #444;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.6)}
    .top{padding:18px 20px;border-bottom:1px solid #444}
    a.btn{display:inline-block;margin-top:12px;background:#64b5f6;color:#fff;padding:10px 14px;border-radius:12px;text-decoration:none;font-weight:700}
    iframe{width:100%;height:90vh;border:0;display:block}
  </style>
</head>
<body>
  <div id="site-nav"></div>
  <script src="./assets/nav.js"></script>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div style="opacity:.85;margin-top:6px">If you can't see the page - click the button below (redirect to the form)</div>
        <a class="btn" href="https://script.google.com/macros/s/AKfycbxlt0h-Id3m7t8qFPZlQUhcMPnrAy3ndH4u820GKw6wk6TvPoa17hlKlgxMog_wAu33/exec" target="_blank" rel="noopener">
          Open feedback form
        </a>
      </div>

      <iframe
        src="https://script.google.com/macros/s/AKfycbxlt0h-Id3m7t8qFPZlQUhcMPnrAy3ndH4u820GKw6wk6TvPoa17hlKlgxMog_wAu33/exec"
        loading="lazy"
        referrerpolicy="no-referrer"
        allow="clipboard-read; clipboard-write">
      </iframe>
    </div>
  </div>
</body>

</html>
